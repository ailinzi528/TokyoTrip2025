<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyotrip2025 Map</title>
    
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css' rel='stylesheet' />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { width: 100%; height: 100vh; }

        /* 悬浮标签 (Caption) */
        .caption {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px 8px;
            border-radius: 4px;
            color: #333;
            font-size: 12px;
            pointer-events: none;
            visibility: hidden;
            white-space: nowrap;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transform: translate(-50%, -100%);
        }

        /* Mapbox Popup 容器基础设置 */
        .mapboxgl-popup {
            max-width: 360px !important;
        }

        .mapboxgl-popup-content {
            padding: 0 !important;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            background: transparent !important;
        }

        /* 整体可点击卡片容器 (3:4 宽高比) */
        .popup-card-link {
            display: block;
            position: relative;
            width: 320px;
            aspect-ratio: 3 / 4;
            text-decoration: none;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            background-color: #f0f0f0; /* 无图时的默认底色 */
        }

        /* 底图样式 */
        .popup-bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.5s ease, transform 0.5s ease;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
            will-change: filter, transform;
        }

        /* 模糊轻量化（3.5px）+ 微放缩 */
        .popup-card-link:hover .popup-bg-img {
            filter: blur(3.5px);
            transform: scale(1.06);
        }

        /* 遮罩文字层：完全透明无黑/白遮罩 */
        .popup-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            background: transparent !important;
            
            opacity: 0;
            transform: translateX(-8px);
            transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s;
            pointer-events: none;
        }

        .popup-card-link:hover .popup-overlay {
            opacity: 1;
            transform: translateX(0);
        }

        /* 偏暗图片：纯白字 (#ffffff) */
        .popup-overlay.dark-bg,
        .popup-overlay.dark-bg .popup-index,
        .popup-overlay.dark-bg .popup-title,
        .popup-overlay.dark-bg .popup-meta,
        .popup-overlay.dark-bg .popup-meta-item { 
            color: #ffffff !important; 
        }

        /* 偏亮图片：纯黑字 (#000000) */
        .popup-overlay.light-bg,
        .popup-overlay.light-bg .popup-index,
        .popup-overlay.light-bg .popup-title,
        .popup-overlay.light-bg .popup-meta,
        .popup-overlay.light-bg .popup-meta-item { 
            color: #000000 !important; 
        }

        /* 编号（如果未来 GeoJSON 里有的话） */
        .popup-index {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: -0.5px;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        /* 标题：普通粗细，限制 2 行省略 */
        .popup-title {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: -0.5px;
            margin: 0 0 10px 0;
            text-align: left;
            
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 描述信息：普通字重，限制 2 行省略 */
        .popup-meta {
            font-size: 14px;
            line-height: 1.5;
            font-weight: 400;
            margin-top: 0;
            text-align: left;
            width: 100%;
        }

        .popup-meta-item {
            font-weight: 400;
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 关闭按钮 */
        .mapboxgl-popup-close-button {
            font-size: 18px;
            color: #666 !important;
            padding: 6px 10px !important;
            z-index: 10;
            background: transparent !important;
            border-radius: 0 8px 0 8px;
        }
        .mapboxgl-popup-close-button:hover {
            background-color: rgba(0, 0, 0, 0.08) !important;
            color: #000 !important;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="caption" class="caption"></div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiYWlsaW56aTUyOCIsImEiOiJjbHp0ZXQxZ3oyY2JuMnJyNHdxc2xndW94In0.1rfDN-c2Pjk5TztXwd0OLg';

    const SWITCH_ZOOM = 18;

    // 🌟 1. 修改初始化地图中心为【东京】(坐标: [139.700, 35.655])
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/ailinzi528/cm07xbfvf00dc01om0ggg2fgv',
        center: [139.700, 35.655],
        zoom: 12
    });

    map.addControl(
        new mapboxgl.GeolocateControl({
            positionOptions: { enableHighAccuracy: true },
            trackUserLocation: true,
            showUserHeading: true
        }),
        'top-left'
    );

    map.addControl(new mapboxgl.NavigationControl(), 'top-left');

    let currentPopup = null;
    let selectedFeatureId = null;

    // 计算图片【左上角 40% 区域】平均亮度的算法函数
    function getImageBrightness(imgElement, callback) {
        if (!imgElement || !imgElement.src) {
            callback(100); // 默认降级
            return;
        }

        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = imgElement.src;

        img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            const sampleWidth = 50;
            const sampleHeight = 50;
            canvas.width = sampleWidth;
            canvas.height = sampleHeight;

            const cropW = (img.naturalWidth || img.width) * 0.4;
            const cropH = (img.naturalHeight || img.height) * 0.4;

            ctx.drawImage(
                img, 
                0, 0, cropW, cropH,
                0, 0, sampleWidth, sampleHeight
            );

            try {
                const imageData = ctx.getImageData(0, 0, sampleWidth, sampleHeight);
                const data = imageData.data;
                let r, g, b, avg;
                let colorSum = 0;

                for (let x = 0, len = data.length; x < len; x += 4) {
                    r = data[x];
                    g = data[x + 1];
                    b = data[x + 2];
                    avg = Math.floor(0.2126 * r + 0.7152 * g + 0.0722 * b);
                    colorSum += avg;
                }

                const brightness = Math.floor(colorSum / (sampleWidth * sampleHeight));
                callback(brightness);
            } catch (e) {
                console.log('图片跨域采样降级:', e);
                callback(100);
            }
        };

        img.onerror = function() {
            callback(100);
        };
    }

    function openPopup(coordinates, properties) {
        if (currentPopup) {
            currentPopup.remove();
        }

        let rawImgUrl = properties.img || properties.image || '';

        // Are.na 高清链接拦截
        if (rawImgUrl.includes('images.are.na')) {
            try {
                const base64Str = rawImgUrl.split('images.are.na/')[1];
                let jsonStr = atob(base64Str);
                let jsonObj = JSON.parse(jsonStr);

                if (jsonObj.edits && jsonObj.edits.resize) {
                    jsonObj.edits.resize.width = 1200;
                    jsonObj.edits.resize.height = 1200;
                }
                if (jsonObj.edits && jsonObj.edits.jpeg) {
                    jsonObj.edits.jpeg.quality = 95;
                }
                if (jsonObj.edits && jsonObj.edits.webp) {
                    jsonObj.edits.webp.quality = 95;
                }

                const newBase64 = btoa(JSON.stringify(jsonObj));
                rawImgUrl = `https://images.are.na/${newBase64}`;
            } catch (e) {
                console.log('图片链接解析升级跳过:', e);
            }
        }

        // 🌟 2. 字段适配：适应新 GeoJSON 的字段属性 (name, description, 1_index 等)
        const title = properties.name || '未命名';
        const index = properties['1_index'] ? `[ ${properties['1_index']} ]` : '';
        const desc = properties.description || properties.desc || properties.add || '';
        const link = properties['3_link'] || properties.url || '#';

        const popupHTML = `
            <a href="${link}" target="_blank" class="popup-card-link">
                ${rawImgUrl ? `<img id="active-popup-img" class="popup-bg-img" src="${rawImgUrl}" alt="${title}">` : ''}
                <div id="active-popup-overlay" class="popup-overlay dark-bg">
                    ${index ? `<div class="popup-index">${index}</div>` : ''}
                    <h3 class="popup-title">${title}</h3>
                    ${desc ? `<div class="popup-meta"><div class="popup-meta-item">${desc}</div></div>` : ''}
                </div>
            </a>
        `;

        currentPopup = new mapboxgl.Popup({
            closeButton: true,
            closeOnClick: false,
            offset: 25
        })
        .setLngLat(coordinates)
        .setHTML(popupHTML)
        .addTo(map);

        const imgElement = document.getElementById('active-popup-img');
        const overlayElement = document.getElementById('active-popup-overlay');

        if (imgElement && overlayElement) {
            getImageBrightness(imgElement, function(brightness) {
                if (brightness > 128) {
                    overlayElement.classList.remove('dark-bg');
                    overlayElement.classList.add('light-bg');
                } else {
                    overlayElement.classList.remove('light-bg');
                    overlayElement.classList.add('dark-bg');
                }
            });
        }

        currentPopup.on('close', function() {
            if (selectedFeatureId !== null) {
                map.setFeatureState(
                    { source: 'geojson-data', id: selectedFeatureId },
                    { selected: false }
                );
                selectedFeatureId = null;
            }
        });
    }

    map.on('zoomstart', () => { if (currentPopup) currentPopup.remove(); });
    map.on('wheel', () => { if (currentPopup) currentPopup.remove(); });
    map.on('pitchstart', () => { if (currentPopup) currentPopup.remove(); });
    map.on('rotatestart', () => { if (currentPopup) currentPopup.remove(); });

    map.on('load', function() {
        // 🌟 3. 请将 'tokyo_team_building.geojson' 替换为你实际的新 GeoJSON 文件路径
        map.addSource('geojson-data', {
            type: 'geojson',
            data: 'tokyo_trip_2025_amass_studio.geojson', 
            cluster: true,
            clusterMaxZoom: SWITCH_ZOOM - 1,
            clusterRadius: 100,
            generateId: true
        });

        map.addLayer({
            id: 'clusters',
            type: 'circle',
            source: 'geojson-data',
            filter: ['all', ['has', 'point_count'], ['<', ['zoom'], SWITCH_ZOOM]],
            paint: {
                'circle-color': '#ffee00',
                'circle-radius': ['step', ['get', 'point_count'], 20, 100, 30, 750, 40]
            }
        });

        map.addLayer({
            id: 'cluster-count',
            type: 'symbol',
            source: 'geojson-data',
            filter: ['all', ['has', 'point_count'], ['<', ['zoom'], SWITCH_ZOOM]],
            layout: {
                'text-field': '{point_count_abbreviated}',
                'text-font': ['DIN Offc Pro Medium', 'Arial Unicode MS Bold'],
                'text-size': 12
            }
        });

        map.addLayer({
            id: 'single-point-as-cluster',
            type: 'circle',
            source: 'geojson-data',
            filter: ['all', ['!', ['has', 'point_count']], ['<', ['zoom'], SWITCH_ZOOM]],
            paint: {
                'circle-color': '#ffee00',
                'circle-radius': 20
            }
        });

        map.addLayer({
            id: 'single-point-as-cluster-count',
            type: 'symbol',
            source: 'geojson-data',
            filter: ['all', ['!', ['has', 'point_count']], ['<', ['zoom'], SWITCH_ZOOM]],
            layout: {
                'text-field': '1',
                'text-font': ['DIN Offc Pro Medium', 'Arial Unicode MS Bold'],
                'text-size': 12
            }
        });

        map.addLayer({
            id: 'unclustered-point-outer',
            type: 'circle',
            source: 'geojson-data',
            filter: ['all', ['!', ['has', 'point_count']], ['>=', ['zoom'], SWITCH_ZOOM]],
            paint: {
                'circle-color': [
                    'case',
                    ['boolean', ['feature-state', 'selected'], false],
                    '#ffee00',
                    'rgba(255, 255, 255, 0.5)'
                ],
                'circle-radius': 20,
                'circle-stroke-width': [
                    'case',
                    ['boolean', ['feature-state', 'selected'], false],
                    0,
                    1.5
                ],
                'circle-stroke-color': '#ffee00'
            }
        });

        map.addLayer({
            id: 'unclustered-point-inner',
            type: 'circle',
            source: 'geojson-data',
            filter: ['all', ['!', ['has', 'point_count']], ['>=', ['zoom'], SWITCH_ZOOM]],
            paint: {
                'circle-color': [
                    'case',
                    ['boolean', ['feature-state', 'selected'], false],
                    '#ffffff',
                    '#ffee00'
                ],
                'circle-radius': 4.5
            }
        });

        map.on('click', 'unclustered-point-outer', function(e) {
            if (!e.features || !e.features.length) return;

            const feature = e.features[0];
            const coordinates = feature.geometry.coordinates.slice();

            if (selectedFeatureId !== null) {
                map.setFeatureState(
                    { source: 'geojson-data', id: selectedFeatureId },
                    { selected: false }
                );
            }

            selectedFeatureId = feature.id;
            map.setFeatureState(
                { source: 'geojson-data', id: selectedFeatureId },
                { selected: true }
            );

            openPopup(coordinates, feature.properties);
        });

        map.on('click', 'clusters', function(e) {
            const features = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
            if (!features.length) return;

            const currentZoom = map.getZoom();
            map.easeTo({
                center: features[0].geometry.coordinates,
                zoom: Math.min(currentZoom + 2, SWITCH_ZOOM),
                duration: 800
            });
        });

        map.on('click', 'single-point-as-cluster', function(e) {
            if (!e.features || !e.features.length) return;

            const currentZoom = map.getZoom();
            map.easeTo({
                center: e.features[0].geometry.coordinates,
                zoom: Math.min(currentZoom + 1.5, SWITCH_ZOOM),
                duration: 600
            });
        });

        map.on('click', function(e) {
            const features = map.queryRenderedFeatures(e.point, { layers: ['unclustered-point-outer', 'clusters', 'single-point-as-cluster'] });
            if (!features.length && currentPopup) {
                currentPopup.remove();
            }
        });

        // 🌟 悬浮 Caption 显示适配
        map.on('mouseenter', 'unclustered-point-outer', function(e) {
            map.getCanvas().style.cursor = 'pointer';
            const features = e.features[0];
            const name = features.properties.name || '未命名';
            const index = features.properties['1_index'] ? `${features.properties['1_index']} ` : '';
            
            const caption = document.getElementById('caption');
            caption.textContent = `${index}${name}`;
            caption.style.visibility = 'visible';
            
            const pixelCoords = map.project(e.lngLat);
            caption.style.left = `${pixelCoords.x}px`;
            caption.style.top = `${pixelCoords.y - 22}px`;
        });

        map.on('mouseleave', 'unclustered-point-outer', function() {
            map.getCanvas().style.cursor = '';
            document.getElementById('caption').style.visibility = 'hidden';
        });

        map.on('mouseenter', 'clusters', function() { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', 'clusters', function() { map.getCanvas().style.cursor = ''; });
        map.on('mouseenter', 'single-point-as-cluster', function() { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', 'single-point-as-cluster', function() { map.getCanvas().style.cursor = ''; });
    });
</script>
</body>
</html>
